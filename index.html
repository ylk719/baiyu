<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Phone OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="spinner"></div>
        <p>Loading Mini OS...</p>
    </div>

    <div id="main-screen" class="main-screen hidden">
        <div class="status-bar">
            <span class="time" id="status-bar-time"></span>
            <div class="status-icons">
                <span>Wi-Fi</span>
                <span>🔋</span>
            </div>
        </div>

        <div class="widgets">
            <div class="widget time-widget">
                <span id="widget-time"></span>
                <span id="widget-date"></span>
            </div>
            <div class="widget weather-widget">
                <span>☀️</span>
                <span>28°C</span>
                <span>Sunny</span>
            </div>
        </div>

        <div class="app-grid">
            <div class="app-icon">
                <img src="https://via.placeholder.com/60/07C160/FFFFFF?text=Chat" alt="Chat App">
                <span>Chat</span>
            </div>
            <div class="app-icon">
                <img src="https://via.placeholder.com/60/07C160/FFFFFF?text=Contacts" alt="Contacts App">
                <span>Contacts</span>
            </div>
            <div class="app-icon">
                <img src="https://via.placeholder.com/60/07C160/FFFFFF?text=Settings" alt="Settings App">
                <span>Settings</span>
            </div>
            <div class="app-icon">
                <img src="https://via.placeholder.com/60/07C160/FFFFFF?text=Browser" alt="Browser App">
                <span>Browser</span>
            </div>
            <!-- More app placeholders can be added here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
