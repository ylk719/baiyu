<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- iPhone全屏强制配置，彻底消除底部白条、浏览器栏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iPhone桌面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
            transition: background 0.3s ease;
        }
        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px 6px;
            font-size: 18px;
            font-weight: 500;
            position: relative;
            z-index: 10;
        }
        /* 横向滑动容器：两页横向排列 */
        .slide-wrap {
            width: 200vw;
            height: calc(100dvh - 160px);
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        /* 单页容器，占满一屏宽度 */
        .page-item {
            width: 100vw;
            height: 100%;
            scroll-snap-align: start;
            padding: 20px 16px;
        }
        /* 页面内空白区域（无任何App图标） */
        .empty-area {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.2;
            font-size: 16px;
        }
        /* 底部Dock栏：fixed固定，滑动页面不会跟着动 */
        .dock-bar {
            position: fixed;
            bottom: env(safe-area-inset-bottom);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(60,60,60,0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 14px 26px;
            display: flex;
            gap: 32px;
            z-index: 99;
        }
        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .dock-icon {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            position: relative;
            overflow: hidden;
            cursor: default;
        }
        .dock-icon.clickable {
            cursor: pointer;
        }
        .dock-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 角标红点 */
        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff3b30;
            color: #fff;
            font-size: 14px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 设置弹窗 */
        .setting-popup{
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.92);
            padding: 40px 20px;
            overflow-y: auto;
            display: none;
            z-index: 999;
        }
        .setting-popup.active{
            display: block;
        }
        .wallpaper-title{
            font-size:22px;
            text-align:center;
            margin-bottom:30px;
        }
        .wallpaper-list{
            display:grid;
            grid-template-columns: repeat(2,1fr);
            gap:20px;
        }
        .wall-item{
            height:160px;
            border-radius:16px;
            overflow:hidden;
            cursor:pointer;
        }
        .wall-item img{
            width:100%;
            height:100%;
            object-fit:cover;
        }
        .save-btn,.back-btn{
            display:block;
            width:70%;
            margin:24px auto;
            line-height:46px;
            text-align:center;
            border-radius:24px;
            font-size:16px;
        }
        .save-btn{
            background:#3276e8;
        }
        .back-btn{
            background:#444444;
        }
        /* 隐藏横向滚动条 */
        .slide-wrap::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 顶部状态栏 -->
    <div class="status-bar">
        <span>21:55</span>
        <span>5G 38</span>
    </div>

    <!-- 左右滑动双页面容器 -->
    <div class="slide-wrap">
        <!-- 第一页：空白无任何App图标 -->
        <div class="page-item">
            <div class="empty-area">第一页（可左右滑动切换）</div>
        </div>
        <!-- 第二页：空白无任何App图标 -->
        <div class="page-item">
            <div class="empty-area">第二页（可左右滑动切换）</div>
        </div>
    </div>

    <!-- 底部固定Dock栏，两页共用，滑动页面不会移动 -->
    <div class="dock-bar">
        <!-- 电话 -->
        <div class="dock-item">
            <div class="dock-icon">
                <img src="phone.png" alt="电话">
                <div class="badge">57</div>
            </div>
        </div>
        <!-- Safari浏览器 -->
        <div class="dock-item">
            <div class="dock-icon">
                <img src="safari.png" alt="Safari">
            </div>
        </div>
        <!-- 设置（唯一可点击交互） -->
        <div class="dock-item">
            <div class="dock-icon clickable" onclick="openSetting()">
                <img src="setting.png" alt="设置">
            </div>
        </div>
        <!-- 信息短信 -->
        <div class="dock-item">
            <div class="dock-icon">
                <img src="message.png" alt="信息">
                <div class="badge">848</div>
            </div>
        </div>
    </div>

    <!-- 壁纸设置弹窗 -->
    <div class="setting-popup" id="settingModal">
        <h3 class="wallpaper-title">更换桌面壁纸</h3>
        <div class="wallpaper-list">
            <div class="wall-item" data-wall="">
                <img src="" alt="原始黑色壁纸">
            </div>
            <div class="wall-item" data-wall="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/3622c322993c41389022122d31d4d711~tplv-a9rns2rl98-image.image">
                <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/3622c322993c41389022122d31d4d711~tplv-a9rns2rl98-image.image" alt="壁纸1">
            </div>
            <div class="wall-item" data-wall="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/82700d0183944038992191d391797266~tplv-a9rns2rl98-image.image">
                <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/82700d0183944038992191d391797266~tplv-a9rns2rl98-image.image" alt="壁纸2">
            </div>
            <div class="wall-item" data-wall="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/95168042093e4218971d41ad36340075~tplv-a9rns2rl98-image.image">
                <img src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9rns2rl98/95168042093e4218971d41ad36340075~tplv-a9rns2rl98-image.image" alt="壁纸3">
            </div>
        </div>
        <div class="save-btn" onclick="saveWallpaper()">保存当前壁纸</div>
        <div class="back-btn" onclick="closeSetting()">返回桌面</div>
    </div>

<script>
    let selectWall = "";
    const bodyDom = document.querySelector('body');
    const modal = document.getElementById('settingModal');
    // 读取本地缓存壁纸，刷新页面保留设置
    if(localStorage.getItem('bgWall')){
        bodyDom.style.backgroundImage = `url(${localStorage.getItem('bgWall')})`;
        bodyDom.style.backgroundSize = "cover";
        bodyDom.style.backgroundPosition = "center";
    }

    // 打开设置弹窗
    function openSetting(){
        modal.classList.add('active');
    }
    // 关闭设置弹窗
    function closeSetting(){
        modal.classList.remove('active');
        selectWall = "";
    }
    // 选中壁纸预览
    document.querySelectorAll('.wall-item').forEach(item=>{
        item.addEventListener('click',function(){
            selectWall = this.dataset.wall;
            document.querySelectorAll('.wall-item').forEach(el=>el.style.outline="none");
            this.style.outline = "3px solid #ffffff";
        })
    })
    // 保存壁纸到本地存储
    function saveWallpaper(){
        if(!selectWall){
            bodyDom.style.background = "#000";
            bodyDom.style.backgroundImage = "";
            localStorage.removeItem('bgWall');
        }else{
            bodyDom.style.backgroundImage = `url(${selectWall})`;
            bodyDom.style.backgroundSize = "cover";
            bodyDom.style.backgroundPosition = "center";
            localStorage.setItem('bgWall',selectWall);
        }
        closeSetting();
    }
</script>
</body>
</html>
