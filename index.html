<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- iOS全屏强制配置，一条都不能少 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="桌面">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 分页小圆点 -->
<div class="page-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
</div>

<!-- 双页滑动容器 -->
<div class="slide-container" id="slider">
    <!-- 第一页 -->
    <div class="page page-1"></div>
    <!-- 第二页 -->
    <div class="page page-2"></div>
</div>

<!-- 底部固定Dock栏，两页共用 -->
<div class="dock">
    <div class="app-icon icon-phone">📞</div>
    <div class="app-icon icon-message">💬</div>
    <div class="app-icon icon-safari">🌐</div>
    <div class="app-icon icon-music">🎵</div>
</div>

<script src="script.js"></script>

</body>
</html>
