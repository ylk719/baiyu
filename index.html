<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="手机桌面">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <meta name="color-scheme" content="light">
    <meta name="format-detection" content="telephone=no">
    <meta name="x5-fullscreen" content="true">
    <meta name="x5-orientation" content="portrait">
    <meta name="full-screen" content="yes">
    <meta name="screen-orientation" content="portrait">
    <meta name="browsermode" content="application">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-touch-icon" content="">
    <meta name="application-name" content="手机桌面">
    <title>手机桌面</title>
    <link rel="stylesheet" href="style.css?v=21">
</head>
<body>
    <div class="phone-container">
        <div class="pages-wrapper" id="pagesWrapper">
            <!-- 第一页 -->
            <div class="page page-1">
                <!-- 顶部卡片 -->
                <div class="top-card">
                    <div class="card-image">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=vintage%20classic%20car%20sepia%20tone%20street%20photography&image_size=landscape_16_9" alt="" class="uploadable" data-upload-id="page1-top">
                    </div>
                    <div class="card-content">
                        <div class="change-btn" data-upload-id="page1-top">换图</div>
                        <div class="card-title">❄️❄️ - 初雪 -</div>
                        <div class="card-subtitle">°♡. Meet you in white December ∂° + 、</div>
                        <div class="card-desc">- 在白色12月 遇见你 -</div>
                    </div>
                </div>

                <!-- 中间内容 -->
                <div class="middle-section">
                    <div class="polaroid-card">
                        <div class="tape"></div>
                        <div class="polaroid-image uploadable" data-upload-id="page1-polaroid">
                            <div class="placeholder-cat">
                                <svg viewBox="0 0 200 200" fill="none" stroke="#bbb" stroke-width="1.5">
                                    <polygon points="40,160 100,70 170,160" fill="#eaeaea" stroke="#ccc"/>
                                    <rect x="55" y="35" width="90" height="50" rx="8" fill="#eaeaea" stroke="#ccc"/>
                                    <circle cx="80" cy="55" r="6" fill="#ccc"/>
                                    <circle cx="120" cy="55" r="6" fill="#ccc"/>
                                    <path d="M90 72 L110 72" stroke="#ccc" stroke-width="2"/>
                                    <rect x="135" y="70" width="35" height="70" rx="3" fill="none" stroke-dasharray="5,4" stroke="#ccc"/>
                                    <circle cx="145" cy="85" r="15" fill="#eaeaea" stroke="#ccc"/>
                                    <text x="145" y="90" text-anchor="middle" fill="#aaa" font-size="14">嗝</text>
                                    <polygon points="60,135 70,115 80,135" fill="none" stroke="#ccc"/>
                                    <text x="70" y="128" text-anchor="middle" fill="#aaa" font-size="16">!</text>
                                </svg>
                            </div>
                        </div>
                        <div class="polaroid-text">图片已被小猫吃掉</div>
                        <div class="polaroid-title">Polaroid</div>
                    </div>

                    <div class="icon-grid-2x2">
                        <div class="app-icon">
                            <div class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
                                </svg>
                            </div>
                            <span>微信</span>
                        </div>
                        <div class="app-icon">
                            <div class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                                </svg>
                            </div>
                            <span>名册</span>
                        </div>
                        <div class="app-icon">
                            <div class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                                </svg>
                            </div>
                            <span>世界书</span>
                        </div>
                        <div class="app-icon">
                            <div class="icon-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="5" width="18" height="14" rx="2"/>
                                    <polyline points="3 7 12 13 21 7"/>
                                </svg>
                            </div>
                            <span>邀约</span>
                        </div>
                    </div>
                </div>

                <div class="page-bottom-spacer"></div>
            </div>

            <!-- 第二页 -->
            <div class="page page-2">
                <!-- 顶部游戏机卡片 -->
                <div class="game-card">
                    <div class="game-top-bar"></div>
                    <div class="game-body">
                        <div class="game-left">
                            <div class="d-pad">
                                <div class="dpad-up"></div>
                                <div class="dpad-left"></div>
                                <div class="dpad-center"></div>
                                <div class="dpad-right"></div>
                                <div class="dpad-down"></div>
                            </div>
                            <div class="dots-grid">
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                            </div>
                            <div class="joystick joystick-left">
                                <div class="joystick-inner"></div>
                            </div>
                        </div>
                        <div class="game-screen uploadable" data-upload-id="page2-game">
                            <span class="upload-hint">点击更换图片</span>
                        </div>
                        <div class="game-right">
                            <div class="action-buttons">
                                <div class="action-btn"></div>
                                <div class="action-btn"></div>
                                <div class="action-btn"></div>
                                <div class="action-btn"></div>
                            </div>
                            <div class="joystick joystick-right">
                                <div class="joystick-inner"></div>
                            </div>
                            <div class="dots-grid">
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                                <div></div><div></div><div></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 中间内容区 -->
                <div class="page2-content">
                    <div class="page2-col-left">
                        <div class="big-widget uploadable" data-upload-id="page2-iscreen">
                            <span class="upload-hint">点击上传</span>
                        </div>
                        <div class="widget-label">iScreen</div>
                        <div class="icon-grid-2x2 small">
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                </div>
                                <span>日程</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                        <text x="7" y="17" font-size="6" fill="currentColor" stroke="none">•</text>
                                        <text x="10" y="17" font-size="6" fill="currentColor" stroke="none">•</text>
                                        <text x="13" y="17" font-size="6" fill="currentColor" stroke="none">•</text>
                                        <text x="16" y="17" font-size="6" fill="currentColor" stroke="none">•</text>
                                    </svg>
                                </div>
                                <span>日历</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="6" y="10" width="12" height="10" rx="2"/>
                                        <path d="M9 10V7a3 3 0 0 1 6 0v3"/>
                                        <path d="M11 15h.01M13 15h.01"/>
                                    </svg>
                                </div>
                                <span>游戏</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                                        <line x1="12" y1="18" x2="12.01" y2="18"/>
                                    </svg>
                                </div>
                                <span>查手机</span>
                            </div>
                        </div>
                    </div>
                    <div class="page2-col-right">
                        <div class="icon-grid-2x2">
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                        <line x1="3" y1="6" x2="21" y2="6"/>
                                        <path d="M16 10a4 4 0 0 1-8 0"/>
                                        <path d="M9 10h.01M15 10h.01"/>
                                    </svg>
                                </div>
                                <span>商城</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <circle cx="12" cy="12" r="10"/>
                                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                                    </svg>
                                </div>
                                <span>美团</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                                    </svg>
                                </div>
                                <span>隐秘时刻</span>
                            </div>
                            <div class="app-icon">
                                <div class="icon-btn">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                                    </svg>
                                </div>
                                <span>记忆库</span>
                            </div>
                        </div>
                        <div class="big-widget uploadable" data-upload-id="page2-widget">
                            <span class="upload-hint">点击上传</span>
                        </div>
                        <div class="widget-label">Widget</div>
                    </div>
                </div>

                <div class="page-bottom-spacer"></div>
            </div>

            <!-- 第三页 -->
            <div class="page page-3">
                <!-- 顶部照片堆叠 -->
                <div class="photo-stack">
                    <div class="floating-photo photo-1">
                        <div class="photo-inner uploadable" data-upload-id="page3-photo1">
                            <span class="upload-hint">点击上传</span>
                        </div>
                        <div class="photo-caption pink">your puppy 😊</div>
                    </div>
                    <div class="floating-photo photo-2">
                        <div class="photo-inner uploadable" data-upload-id="page3-photo2">
                            <span class="upload-hint">点击上传</span>
                        </div>
                        <div class="photo-caption"></div>
                    </div>
                    <div class="floating-photo photo-3">
                        <div class="photo-inner uploadable" data-upload-id="page3-photo3">
                            <span class="upload-hint">点击上传</span>
                        </div>
                        <div class="photo-caption pink">🐰YEAH!🐾</div>
                    </div>
                </div>

                <!-- 中间图标 -->
                <div class="page3-icons">
                    <div class="app-icon large">
                        <div class="icon-btn large">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                            </svg>
                        </div>
                        <span>闹钟</span>
                    </div>
                    <div class="app-icon large">
                        <div class="icon-btn large">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polyline points="9 17 4 12 9 7"/>
                                <path d="M20 5v14"/>
                                <path d="M4 12h13"/>
                            </svg>
                        </div>
                        <span>外出</span>
                    </div>
                </div>

                <div class="page-bottom-spacer"></div>
            </div>
        </div>

        

        <!-- 底部导航栏 -->
        <div class="bottom-nav">
            <div class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M18 2L16 4M14 6l-2 2M10 10l-2 2M6 14L4 16"/>
                        <circle cx="18" cy="6" r="2"/>
                        <path d="M21 3L3 21"/>
                    </svg>
                </div>
                <span>外观</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <span>论坛</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                </div>
                <span>情侣空间</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </div>
                <span>设置</span>
            </div>
        </div>

        <!-- 底部安全区 -->
        <div class="safe-area-bottom">
            <div class="home-indicator"></div>
        </div>
    </div>

    <!-- 隐藏的文件输入 -->
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <script src="main.js?v=7"></script>
</body>
</html>
