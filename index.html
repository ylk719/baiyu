<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- ios主屏幕全屏配置 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="自制手机桌面">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="slide-wrap">
    <!-- 第一页 -->
    <div class="page-item">
        <!-- 在此粘贴第一页所有组件 -->
        <div class="cen-direct-dock-wrap">
            <div class="cen-direct-icon phone">📞</div>
            <div class="cen-direct-icon msg">💬</div>
            <div class="cen-direct-icon safari">🌐</div>
            <div class="cen-direct-icon music">🎵</div>
        </div>
    </div>
    <!-- 第二页，底部同样配有Dock图标栏 -->
    <div class="page-item">
        <!-- 在此粘贴第二页所有组件 -->
        <div class="cen-direct-dock-wrap">
            <div class="cen-direct-icon phone">📞</div>
            <div class="cen-direct-icon msg">💬</div>
            <div class="cen-direct-icon safari">🌐</div>
            <div class="cen-direct-icon music">🎵</div>
        </div>
    </div>
</div>
<!-- 分页指示器小圆圈 -->
<div class="page-dots">
    <span class="page-dot active" data-page="0"></span>
    <span class="page-dot" data-page="1"></span>
</div>
<script src="script.js"></script>
</body>
</html>
